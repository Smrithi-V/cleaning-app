{% extends "base_reg.html" %}

{% block title %}Login | Wardiere{% endblock %}

{% block content %}
<section class="min-h-[70vh] flex items-center justify-center">
    <div class="auth-card">

        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto rounded-2xl bg-white shadow-soft flex items-center justify-center mb-4">
                <img src="{{ url_for('static', filename='images/logo.png') }}" class="h-12 w-12 object-contain">
            </div>

            <h1 class="text-3xl font-black text-ink">Welcome back</h1>
            <p class="text-muted mt-2">Log in to manage your student cleaning exchange.</p>
        </div>

        <form method="POST" class="space-y-5">
            <div>
                <label class="label">Username</label>
                <input type="text" name="username" class="input" placeholder="Enter your username" required>
            </div>

            <div>
                <label class="label">Password</label>
                <input type="password" name="password" class="input" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="primary-btn w-full">
                <i class="fa-solid fa-right-to-bracket mr-2"></i>
                Log In
            </button>
        </form>

        <p class="text-center text-sm text-muted mt-6">
            New here?
            <a href="{{ url_for('signup') }}" class="text-teal-700 font-black">Create an account</a>
        </p>

    </div>
</section>
{% endblock %}
