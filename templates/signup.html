{% extends "base_reg.html" %}

{% block title %}Sign Up | Clean Mates{% endblock %}

{% block content %}
<section class="min-h-[70vh] flex items-center justify-center">
    <div class="soft-card w-full max-w-md">

        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto rounded-2xl bg-white shadow-soft flex items-center justify-center mb-4">
                <img src="{{ url_for('static', filename='images/logo.jpg') }}" class="h-12 w-12 object-contain">
            </div>

            <h1 class="text-3xl font-black text-ink">Join Clean Mates</h1>
            <p class="text-muted mt-2">Create your student account and start exchanging help.</p>
        </div>

        <form method="POST" class="space-y-5">
            <div>
                <label class="label">Username</label>
                <input type="text" name="username" class="input" placeholder="Choose a username" required>
            </div>

            <div>
                <label class="label">Email</label>
                <input type="email" name="email" class="input" placeholder="Enter your student email" required>
            </div>

            <div>
                <label class="label">Password</label>
                <input type="password" name="password" class="input" placeholder="Create a password" required>
            </div>

            <button type="submit" class="primary-btn w-full">
                <i class="fa-solid fa-user-plus mr-2"></i>
                Sign Up
            </button>
        </form>

        <p class="text-center text-sm text-muted mt-6">
            Already have an account?
            <a href="{{ url_for('login') }}" class="text-teal-700 font-black">Log in</a>
        </p>

    </div>
</section>
{% endblock %}
